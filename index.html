<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Live sehen — Bandliste</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎸</text></svg>">
<meta property="og:title" content="Live sehen — Bandliste">
<meta property="og:description" content="Bands die ich noch live sehen will">
<meta property="og:type" content="website">
<meta property="og:url" content="https://bands.logge.top">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050505;--accent:#ff2d55;--accent2:#bf5af2;--green:#30d158;--text:#fff;--muted:#666;--card:rgba(255,255,255,.04)}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow-x:hidden}
.bg{position:fixed;inset:0;z-index:-1;background:var(--bg)}
.bg::before{content:'';position:absolute;top:-40%;left:-20%;width:80%;height:80%;background:radial-gradient(circle,rgba(255,45,85,.08) 0%,transparent 70%);animation:drift 20s ease-in-out infinite}
.bg::after{content:'';position:absolute;bottom:-30%;right:-20%;width:70%;height:70%;background:radial-gradient(circle,rgba(191,90,242,.06) 0%,transparent 70%);animation:drift 25s ease-in-out infinite reverse}
@keyframes drift{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,-30px)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,45,85,.4)}50%{box-shadow:0 0 20px 4px rgba(255,45,85,.1)}}
header{text-align:center;padding:60px 20px 32px;position:relative}
h1{font-size:3rem;font-weight:900;letter-spacing:-2px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--muted);margin-top:8px;font-size:.9rem;letter-spacing:.5px}
.st{display:flex;justify-content:center;gap:40px;margin-top:24px}
.st div{text-align:center}
.st .nm{font-size:2.2rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.st .nm.s{background:linear-gradient(135deg,var(--green),#0af);-webkit-background-clip:text;background-clip:text}
.st .lb{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-top:4px}
.fl{display:flex;justify-content:center;gap:8px;margin:28px 0 8px;flex-wrap:wrap}
.fl button{background:transparent;border:1px solid #333;color:var(--text);padding:8px 20px;border-radius:24px;cursor:pointer;font-size:.8rem;transition:all .3s;backdrop-filter:blur(10px)}
.fl button.on{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;font-weight:600}
.fl button:hover{border-color:var(--accent);transform:scale(1.05)}
.sec{max-width:1100px;margin:32px auto 14px;padding:0 16px;font-size:.85rem;font-weight:700;display:flex;align-items:center;gap:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted)}
.sec em{font-style:normal;font-size:1.1rem}
.sec .c{font-weight:400;opacity:.5}
.sec::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,#333,transparent)}
.g{max-width:1100px;margin:0 auto;padding:0 12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:8px}
.card{background:var(--card);border-radius:16px;overflow:hidden;border:1px solid rgba(255,255,255,.06);transition:all .3s;cursor:pointer;backdrop-filter:blur(20px);animation:slideUp .4s ease both}
.card:hover{border-color:rgba(255,45,85,.3);transform:translateY(-2px) scale(1.01);background:rgba(255,255,255,.07)}
.card.playing{border-color:var(--accent);animation:pulse 2s ease infinite}
.card.seen{opacity:.75}.card.seen:hover{opacity:.9}

.top{display:flex;align-items:center;gap:12px;padding:14px 16px;position:relative}
.av{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:800;flex-shrink:0;overflow:hidden;color:rgba(255,255,255,.8)}
.av.sm{width:44px;height:44px;border-radius:12px}
.av img{width:100%;height:100%;object-fit:cover}
.inf{flex:1;min-width:0}
.n{font-weight:700;font-size:.95rem;letter-spacing:-.3px}
.gen{color:var(--muted);font-size:.7rem;margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.trk{font-size:.7rem;margin-top:4px;opacity:.6;display:flex;align-items:center;gap:4px}
.note{font-size:.65rem;color:var(--muted);margin-top:2px;font-style:italic;display:flex;align-items:center;gap:3px}
.trk::before{content:'♫';color:var(--accent)}
.badge{position:absolute;top:8px;right:10px;font-size:.55rem;padding:3px 8px;border-radius:8px;font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.badge.w{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.badge.d{background:var(--green);color:#000}
.bar{height:2px;background:rgba(255,255,255,.06);margin:0 16px 12px;border-radius:1px;overflow:hidden}
.prog{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:1px;transition:width .1s}
.vol{display:flex;align-items:center;gap:8px;margin-top:4px}
.vol input[type=range]{-webkit-appearance:none;width:80px;height:4px;background:#333;border-radius:2px;outline:none}
.vol input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer}
.vol span{font-size:.7rem;color:var(--muted);width:20px;text-align:center}
footer{text-align:center;padding:60px 20px 40px;color:#333;font-size:.7rem;letter-spacing:1px;text-transform:uppercase}
@media(max-width:640px){.g{grid-template-columns:1fr}h1{font-size:2rem}.st .nm{font-size:1.6rem}.st{gap:24px}}
</style>
</head>
<body>
<div class="bg"></div>
<header>
<h1>LIVE SEHEN</h1>
<p>Bands die ich noch live sehen will</p>
<div class="st">
<div><div class="nm" id="wc">-</div><div class="lb">Bucket List</div></div>
<div><div class="nm s" id="sc">-</div><div class="lb">Erlebt ✓</div></div>
<div><div class="nm" id="tc">-</div><div class="lb">Total</div></div>
</div>
<div class="vol" style="justify-content:center;margin-top:16px">
<span>🔈</span>
<input type="range" id="vol" min="0" max="1" step="0.05" value="0.7" oninput="if(au)au.volume=this.value">
<span>🔊</span>
</div>
</header>
<div class="sec" id="ws"><em>🎯</em> BUCKET LIST <span class="c" id="wn"></span></div>
<div class="g" id="wg"></div>
<div class="sec" id="ss"><em>✓</em> ERLEBT <span class="c" id="sn"></span></div>
<div class="g" id="sg"></div>
<footer>Made with 🎸 & good taste</footer>
<script>
let au=null,cur=null;
const h=n=>n.split('').reduce((a,c)=>a+c.charCodeAt(0),0)%360;
const ini=n=>n.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();

function mkCard(b,seen,dz,i){
  const el=document.createElement('div');
  el.className='card'+(seen?' seen':'');
  el.style.animationDelay=`${i*0.03}s`;
  const img=dz&&dz.img?`<img src="${dz.img}" alt="${b.name}" loading="lazy">`:`${ini(b.name)}`;
  const avStyle=dz&&dz.img?'':`style="background:hsl(${h(b.name)},50%,20%)"`;
  const track=dz&&dz.track?`<div class="trk">${dz.track}</div>`:'';const note=b.note?`<div class="note">📍 ${b.note}</div>`:'';
  const preview=dz&&dz.preview?dz.preview:'';
  
  el.innerHTML=`<div class="top">
    <div class="av${seen?' sm':''}" ${avStyle}>${img}</div>
    <div class="inf"><div class="n">${b.name}</div><div class="gen">${b.genre||''}</div>${track}${note}</div>
    <span class="badge ${seen?'d':'w'}">${seen?'✓':'want'}</span>
  </div>${preview?'<div class="bar"><div class="prog"></div></div>':''}`;
  
  if(preview){
    el.onclick=()=>{
      if(cur){cur.classList.remove('playing')}
      if(au){au.pause();if(cur===el){cur=null;return}}
      el.classList.add('playing');cur=el;
      au=new Audio(preview);
      const bar=el.querySelector('.prog');
      au.ontimeupdate=()=>{if(bar&&au.duration)bar.style.width=(au.currentTime/au.duration*100)+'%'};
      au.onended=()=>{el.classList.remove('playing');if(bar)bar.style.width='0';cur=null};
      au.volume=parseFloat(document.getElementById('vol').value);au.play();
    };
  }
  return el;
}

async function init(){
  const r=await fetch('bands.json');
  const data=await r.json();
  const wg=document.getElementById('wg');
  const sg=document.getElementById('sg');
  wg.innerHTML='';sg.innerHTML='';
  
  document.getElementById('wc').textContent=data.want.length;
  document.getElementById('sc').textContent=data.seen.length;
  document.getElementById('tc').textContent=data.want.length+data.seen.length;
  document.getElementById('wn').textContent=`(${data.want.length})`;
  document.getElementById('sn').textContent=`(${data.seen.length})`;
  
  data.want.forEach((b,i)=>{
    wg.appendChild(mkCard(b,false,{img:b.img,track:b.trackTitle,preview:b.preview},i));
  });
  data.seen.forEach((b,i)=>{
    sg.appendChild(mkCard(b,true,{img:b.img,track:b.trackTitle,preview:b.preview},i));
  });
}


init();
</script>
</body>
</html>
