<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Live sehen — Bandliste</title>
<meta property="og:title" content="Live sehen — Bandliste">
<meta property="og:description" content="Bands die ich noch live sehen will — und welche ich schon gesehen hab">
<meta property="og:type" content="website">
<meta property="og:url" content="https://bands.logge.top">
<meta name="description" content="Bands die ich noch live sehen will">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎸</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--card:#151515;--accent:#e63946;--green:#2ecc71;--text:#f1faee;--muted:#555}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding-bottom:40px}
header{text-align:center;padding:44px 20px 28px;background:linear-gradient(180deg,#1a0808,var(--bg))}
h1{font-size:2.2rem;font-weight:800;letter-spacing:-1px}
h1 span{color:var(--accent)}
header p{color:var(--muted);margin-top:6px;font-size:.88rem}
.st{display:flex;justify-content:center;gap:28px;margin-top:18px}
.st div{text-align:center}.st .nm{font-size:1.8rem;font-weight:700}
.st .nm.w{color:var(--accent)}.st .nm.s{color:var(--green)}
.st .lb{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px}
.fl{display:flex;justify-content:center;gap:8px;margin:20px 0 4px;flex-wrap:wrap}
.fl button{background:var(--card);border:1px solid #333;color:var(--text);padding:7px 16px;border-radius:20px;cursor:pointer;font-size:.82rem;transition:all .2s}
.fl button.on{background:var(--accent);border-color:var(--accent)}
.fl button:hover{border-color:var(--accent)}
.sec{max-width:1100px;margin:28px auto 10px;padding:0 16px;font-size:1rem;font-weight:700;display:flex;align-items:center;gap:8px}
.sec em{color:var(--accent);font-style:normal}.sec .c{color:var(--muted);font-weight:400;font-size:.82rem}
.g{max-width:1100px;margin:0 auto;padding:0 12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}
.card{background:var(--card);border-radius:12px;overflow:hidden;border:1px solid #222;transition:all .2s;cursor:pointer}
.card:hover{border-color:#444;transform:translateY(-1px)}
.card.seen:hover{transform:translateY(-1px)}
.card.seen .n{opacity:.5;text-decoration:line-through;text-decoration-color:var(--accent)}
.card.seen .gen{opacity:.4}.card.seen .av{opacity:.5}
.card.playing{border-color:var(--accent)}
.top{display:flex;align-items:center;gap:12px;padding:12px 14px;position:relative}
.av{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;flex-shrink:0;overflow:hidden;color:rgba(255,255,255,.7)}
.av.sm{width:40px;height:40px}
.av img{width:100%;height:100%;object-fit:cover}
.inf{flex:1;min-width:0}
.n{font-weight:700;font-size:.92rem}
.gen{color:var(--muted);font-size:.72rem;margin-top:1px}
.trk{color:var(--accent);font-size:.7rem;margin-top:3px;opacity:.8}
.badge{position:absolute;top:6px;right:8px;font-size:.58rem;padding:2px 7px;border-radius:8px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.badge.w{background:var(--accent);color:#fff}.badge.d{background:var(--green);color:#000}
.bar{height:3px;background:#222;margin:0 14px 10px}.prog{height:100%;width:0;background:var(--accent);border-radius:2px;transition:width .1s}
.ld{text-align:center;padding:60px;color:var(--muted)}
@media(max-width:640px){.g{grid-template-columns:1fr}h1{font-size:1.6rem}.st .nm{font-size:1.4rem}}
</style>
</head>
<body>
<header>
<h1>🎸 <span>Live</span> sehen</h1>
<p>Bands die ich noch live sehen will</p>
<div class="st">
<div><div class="nm w" id="wc">-</div><div class="lb">Will sehen</div></div>
<div><div class="nm s" id="sc">-</div><div class="lb">Gesehen ✓</div></div>
<div><div class="nm" id="tc">-</div><div class="lb">Gesamt</div></div>
</div>
</header>
<div class="fl">
<button class="on" onclick="fi('all',this)">Alle</button>
<button onclick="fi('want',this)">🎯 Will sehen</button>
<button onclick="fi('seen',this)">✓ Gesehen</button>
</div>
<div class="sec" id="ws"><em>🎯</em> Will ich noch live sehen <span class="c" id="wn"></span></div>
<div class="g" id="wg"><div class="ld">Lade...</div></div>
<div class="sec" id="ss"><em>✓</em> Bereits gesehen <span class="c" id="sn"></span></div>
<div class="g" id="sg"><div class="ld">Lade...</div></div>
<script>
let au=null,cur=null;
const h=n=>n.split('').reduce((a,c)=>a+c.charCodeAt(0),0)%360;
const ini=n=>n.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();



function mkCard(b,seen,dz){
  const el=document.createElement('div');
  el.className='card'+(seen?' seen':'');
  const img=dz&&dz.img?`<img src="${dz.img}" alt="${b.name}" loading="lazy">`:`${ini(b.name)}`;
  const avStyle=dz&&dz.img?'':`style="background:hsl(${h(b.name)},45%,28%)"`;
  const track=dz&&dz.track?`<div class="trk">♫ ${dz.track}</div>`:'';
  const preview=dz&&dz.preview?dz.preview:'';
  
  el.innerHTML=`<div class="top">
    <div class="av${seen?' sm':''}" ${avStyle}>${img}</div>
    <div class="inf"><div class="n">${b.name}</div><div class="gen">${b.genre||''}</div>${track}</div>
    <span class="badge ${seen?'d':'w'}">${seen?'✓':'🎯'}</span>
  </div>${preview?'<div class="bar"><div class="prog"></div></div>':''}`;
  
  if(preview){
    el.onclick=()=>{
      if(cur){cur.classList.remove('playing')}
      if(au){au.pause();if(cur===el){cur=null;return}}
      el.classList.add('playing');cur=el;
      au=new Audio(preview);
      const bar=el.querySelector('.prog');
      au.ontimeupdate=()=>{if(bar&&au.duration)bar.style.width=(au.currentTime/au.duration*100)+'%'};
      au.onended=()=>{el.classList.remove('playing');if(bar)bar.style.width='0';cur=null};
      au.play();
    };
  }
  return el;
}

async function init(){
  const r=await fetch('bands.json');
  const data=await r.json();
  const wg=document.getElementById('wg');
  const sg=document.getElementById('sg');
  wg.innerHTML='';sg.innerHTML='';
  
  document.getElementById('wc').textContent=data.want.length;
  document.getElementById('sc').textContent=data.seen.length;
  document.getElementById('tc').textContent=data.want.length+data.seen.length;
  document.getElementById('wn').textContent=`(${data.want.length})`;
  document.getElementById('sn').textContent=`(${data.seen.length})`;
  
  for(const b of data.want){
    wg.appendChild(mkCard(b,false,{img:b.img,track:b.trackTitle,preview:b.preview}));
  }
  for(const b of data.seen){
    sg.appendChild(mkCard(b,true,{img:b.img,track:b.trackTitle,preview:b.preview}));
  }
}

function fi(v,btn){
  document.querySelectorAll('.fl button').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  ['ws','wg'].forEach(id=>document.getElementById(id).style.display=v==='seen'?'none':'');
  ['ss','sg'].forEach(id=>document.getElementById(id).style.display=v==='want'?'none':'');
}

init();
</script>
</body>
</html>
